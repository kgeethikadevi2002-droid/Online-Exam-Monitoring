<!DOCTYPE html>
<html>
<head>
<title>Exam Session</title>
<link rel="stylesheet" href="{{url_for('static', filename='css/style.css')}}">
</head>
<body>
<div class="navbar">
    <h1>Exam Session - {{candidate_id}}</h1>
    <div><a href="/logout">Logout</a></div>
</div>

<div class="container dashboard">
<h2>Exam Session</h2>

{% if status %}
    <p class="status">{{status}}</p>
{% else %}
    <p class="status">Exam Started</p>
{% endif %}

<div class="btn-group">
    <a href="{{url_for('session_action', action='pause')}}" class="btn btn-pause">Pause</a>
    <a href="{{url_for('session_action', action='resume')}}" class="btn btn-resume">Resume</a>
    <a href="{{url_for('session_action', action='end')}}" class="btn btn-end">End Exam</a>
</div>
<br>
<a href="{{url_for('dashboard')}}">Back to Dashboard</a>
</div>

<script src="{{url_for('static', filename='js/monitor.js')}}"></script>
</body>
</html>
